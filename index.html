<!DOCTYPE html>
<html>
    <head>
        <title>draw the sts card</title>
        <link rel="stylesheet" href="index.css">
        <script src="https://colorjs.io/dist/color.global.js"></script>
        <script src="https://elements.colorjs.io/src/color-picker/color-picker.js" type="module"></script><link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kreon:wght@300..700&display=swap" rel="stylesheet">
    </head>
    <body class="kreon-font">
        <div id="drawing">
            <div class="container" id="drawing-container">
                <div id="cardui-container">
                    <img class="cardui-part cardui-base" id="cardui-base" src="data/cardui/Base-Attack-Red.png">
                    <div class="cardui-part cardui-text cardui-base-text" id="cardui-base-text">description</div>
                    <div id="canvas-container">
                        <canvas id="drawing-canvas"></canvas>
                    </div>
                    <img class="cardui-part cardui-border" id="cardui-border" src="data/cardui/Border-Attack-Common.png">
                    <img class="cardui-part cardui-banner" id="cardui-banner" src="data/cardui/Banner-Common.png">
                    <div class="cardui-part cardui-text cardui-banner-text" id="cardui-banner-text">title</div>
                    <img class="cardui-part cardui-energy" id="cardui-energy" src="data/cardui/Energy-Red.png">
                    <div class="cardui-part cardui-text cardui-energy-text" id="cardui-energy-text">1</div>
                </div>
            </div>
            <div class="container">
                <div class="inner-container" id="colour-container">
                    <color-picker id="picker" space="hsl" color="rgb(141, 31, 10)" color-space="">
                        <div slot="color-space"></div>
                    </color-picker>
                </div>
                <div class="inner-container" id="thickness-container">
                    <label for="thickness">Thickness</label><br>
                    <input type="range" name="thickness" id="thickness" min="1" max="30" value="5">
                    <label for="thickness"><svg width="50" height="50">
                        <circle id="thickness-display" r="5" cx="25" cy="25" stroke="black" stroke-width="1" />
                    </svg></label>
                </div>
            </div>
            <div class="container">
                <button onclick="submit()">Submit</button>
            </div>
        </div>
        <div id="results">
            <div class="container">
                <img id="real-card">
                <img id="drawn-card">
            </div>
            <div class="container">
                <p class="score">Accuracy: <span id="score-value"></span>%</p>
            </div>
        </div>
        </body>
    <script src="index.js"></script>
</html>
