<!DOCTYPE html>
<html>
    <head>
        <title>draw the sts card</title>
        <link rel="stylesheet" href="index.css">
        <script src="https://elements.colorjs.io/src/color-picker/color-picker.js" type="module"></script>
    </head>
    <body>
        <div id="drawing">
            <div class="container">
                <canvas id="drawing-canvas"></canvas>
            </div>
            <div class="container">
                <color-picker id="picker" space="hsv" color="color(--hsv 352 75% 38%)" color-space="">
                    <div slot="color-space"></div>
                </color-picker>
            </div>
            <div class="container">
                <button onclick="submit()">Submit</button>
            </div>
        </div>
        <div id="results">
            <div class="container">
                <img id="real-card">
                <img id="drawn-card">
            </div>
        </div>
        </body>
    <script src="index.js"></script>
</html>
